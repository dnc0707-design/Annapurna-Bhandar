<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annapurna Yojna Missing List Query</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-bg: #F6F9FC; --card-bg: #FFFFFF; --text-main: #0A2540; --text-muted: #425466; --accent-blue: #0070F3; --accent-hover: #0051B3; --border-color: #E6E8EB; --danger: #E02424; --warning: #D97706; }
        body { font-family: 'Inter', sans-serif; background-color: var(--primary-bg); color: var(--text-muted); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card-bg); border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 30px; margin-bottom: 30px; border: 1px solid var(--border-color); }
        .btn { background-color: var(--accent-blue); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-weight: 600; }
        .btn:hover { background-color: var(--accent-hover); transform: translateY(-1px); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .form-control { padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; width: 100%; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #F8FAFC; padding: 16px; text-align: left; border-bottom: 2px solid var(--border-color); }
        td { padding: 16px; border-bottom: 1px solid var(--border-color); }
        .admin-only { display: none; }
        body.is-admin .admin-only { display: inline-block; }
        body.is-admin .admin-only-cell { display: table-cell; }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 20px;">
            <button class="btn admin-only" id="mergeBtn" onclick="mergeDatabases()">Merge Databases</button>
            <button class="btn" id="adminBtn" onclick="toggleAdmin()">Admin Login</button>
        </div>

        <div class="card" style="text-align: center;">
            <h1>Annapurna Yojna Missing list Query for Santuri, Raghunathpur-1, Raghunathpur Town & Nituria</h1>
            <p>অন্নপূর্ণা যোজনা নাম মিসিং লিস্ট</p>
        </div>

        <div class="card" id="formCard">
            <form id="submissionForm">
                <div class="form-grid">
                    <div><label>Application Submission Date</label><input type="date" id="appDate" class="form-control" required></div>
                    <div><label>Application ID</label><input type="text" id="appId" class="form-control" required></div>
                    <div><label>Beneficiary Name</label><input type="text" id="appName" class="form-control" required></div>
                    <div><label>Block & Municipality</label>
                        <select id="blockSelect" class="form-control" required onchange="populatePanchayats()">
                            <option value="">-- Select --</option>
                            <option value="Santuri">Santuri</option>
                            <option value="Raghunathpur 1">Raghunathpur 1</option>
                            <option value="Raghunathpur Town">Raghunathpur Town</option>
                            <option value="Nituria">Nituria</option>
                        </select>
                    </div>
                    <div><label>Panchayat / Ward</label>
                        <select id="panchayatSelect" class="form-control" required disabled>
                            <option value="">-- Select Block First --</option>
                        </select>
                    </div>
                </div>
                <button type="button" class="btn" style="width:100%; margin-top: 20px;" onclick="submitData()">Submit Query</button>
            </form>
        </div>

        <div class="card">
            <h3>Applications List</h3>
            <div style="overflow-x: auto;">
                <table id="dataTable">
                    <thead>
                        <tr><th>Date</th><th>App ID</th><th>Name</th><th>Block</th><th>Panchayat</th><th>Admin Remark</th><th class="admin-only">Actions</th></tr>
                    </thead>
                    <tbody id="tableBody"><tr><td colspan="7">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEPlnsWfKqr7akfKXrLE6zJhfBVjdUb3Q",
            authDomain: "annapurna-bhandar-9d9ae.firebaseapp.com",
            projectId: "annapurna-bhandar-9d9ae",
            storageBucket: "annapurna-bhandar-9d9ae.firebasestorage.app",
            messagingSenderId: "472903565913",
            appId: "1:472903565913:web:d379e28809fdecbf20e748"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        window.allApplications = [];
        window.isAdmin = false;

        async function fetchData() {
            window.allApplications = [];
            const paths = [
                "annapurna_submissions",
                "annapurna-yojna-portal",
                "annapurna_portal"
            ];
            
            // Fetch flat collections
            for (const path of paths) {
                try {
                    const snap = await getDocs(collection(db, path));
                    snap.forEach(d => window.allApplications.push({ id: d.id, ...d.data() }));
                } catch(e) { console.warn("Path inaccessible:", path); }
            }

            // Fetch nested artifact path
            try {
                const nestedSnap = await getDocs(collection(db, "artifacts/annapurna-yojna-portal/public/data/applications"));
                nestedSnap.forEach(d => window.allApplications.push({ id: d.id, ...d.data() }));
            } catch(e) { console.warn("Nested path inaccessible"); }

            renderTable();
        }

        window.renderTable = function() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            // Robust key mapping to handle different field names
            window.allApplications.forEach(app => {
                const date = app.date || app.appDate || app.SubmissionDate || '-';
                const appId = app.appId || app.ApplicationID || '-';
                const name = app.name || app.BeneficiaryName || '-';
                const block = app.block || app.BlockAndMunicipality || '-';
                const p = app.panchayat || app.PanchayatWard || '-';
                
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${date}</td><td>${appId}</td><td>${name}</td><td>${block}</td><td>${p}</td><td>${app.adminRemark || 'Pending'}</td><td class="admin-only admin-only-cell"><button onclick="alert('Admin editing enabled')">Edit</button></td>`;
                tbody.appendChild(tr);
            });
        };

        window.submitData = async function() {
            await addDoc(collection(db, "annapurna_submissions"), {
                date: document.getElementById('appDate').value,
                appId: document.getElementById('appId').value,
                name: document.getElementById('appName').value,
                block: document.getElementById('blockSelect').value,
                panchayat: document.getElementById('panchayatSelect').value,
                createdAt: Date.now()
            });
            alert("Submitted Successfully!");
            location.reload();
        };

        window.toggleAdmin = function() {
            const pass = prompt("Enter Admin Password:");
            if(pass === "santuri123") {
                window.isAdmin = true;
                document.body.classList.add('is-admin');
                alert("Admin Mode Enabled");
            }
        };

        window.populatePanchayats = function() {
            const block = document.getElementById('blockSelect').value;
            const pSelect = document.getElementById('panchayatSelect');
            const data = {
                "Santuri": ["Santuri", "RCPur-Kotaldi", "Balitora", "Tarabari", "Muradi", "Garshika"],
                "Raghunathpur 1": ["Arrah", "Babugram", "Bero", "Chorpania", "Khajura", "Nutandi", "Sanka"],
                "Raghunathpur Town": ["Ward 1", "Ward 2", "Ward 3", "Ward 4", "Ward 5", "Ward 6", "Ward 7", "Ward 8", "Ward 9", "Ward 10", "Ward 11", "Ward 12", "Ward 13"],
                "Nituria": ["Bhamuria", "Dakshin Parulia", "Dessermohan", "Gunjan", "Hirapur", "Parbelia", "Raibandh", "Saltore", "Sarbari"]
            };
            pSelect.innerHTML = '<option value="">-- Select --</option>';
            if(block && data[block]) {
                data[block].forEach(p => pSelect.innerHTML += `<option value="${p}">${p}</option>`);
                pSelect.disabled = false;
            }
        };

        window.mergeDatabases = async function() {
            if(!confirm("Are you sure you want to merge all records to the main database?")) return;
            for(const app of window.allApplications) {
                await addDoc(collection(db, "annapurna_submissions"), app);
            }
            alert("Merge Complete!");
        };

        signInAnonymously(getAuth(app)).then(() => fetchData());
    </script>
</body>
</html>
